<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Form</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ✅ Correct CSS path -->
    <link rel="stylesheet" href="../styles/signup.css">
</head>

<body>
    <div class="container">

        <div class="signup-container">

            <!-- ✅ Correct image path -->
            <div class="logo">
                <img src="../images/braintel.png" alt="Logo">
            </div>

            <h2>Sign Up</h2>

            <button class="social-login google">
                <i class="fab fa-google"></i> Continue with Google
            </button>

            <button class="social-login facebook">
                <i class="fab fa-facebook"></i> Continue with Facebook
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Signup Form -->
            <form id="signupForm">

                <div class="input-group">
                    <input type="text" id="firstName" placeholder="First Name" required>
                    <input type="text" id="lastName" placeholder="Last Name" required>
                </div>

                <div class="email-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="password-group">
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="toggle-password">
                        <i class="fa-solid fa-eye-slash"></i>
                    </span>
                </div>

                <!-- Buttons -->
                <button type="button" id="submitSignUpFreelancer" class="signup-btn">
                    Join as Freelancer
                </button>

                <button type="button" id="submitSignUpClient" class="signup-btn">
                    Join as Client
                </button>

            </form>

            <p>Already have an account? <a href="login.html">Log In</a></p>

        </div>
    </div>

</body>

</html>
