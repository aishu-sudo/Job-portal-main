<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --success-color: #4bb543;
            --warning-color: #fca311;
            --danger-color: #ef233c;
            --border-radius: 12px;
            --box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark-color);
            line-height: 1.6;
            padding: 20px;
        }
        
        .profile-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .profile-card:hover {
            transform: translateY(-5px);
        }
        
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }
        
        .avatar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
            transition: transform 0.3s ease;
        }
        
        .avatar:hover {
            transform: scale(1.05);
        }
        
        .freelancer-name {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
            font-weight: 700;
        }
        
        .freelancer-role {
            text-align: center;
            color: #757575;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        h2 {
            color: var(--primary-color);
            margin: 25px 0 15px;
            font-size: 18px;
            position: relative;
            padding-bottom: 8px;
        }
        
        h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 3px;
        }
        
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .contact-icon {
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .contact-item:hover .contact-icon {
            background: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }
        
        .contact-details {
            flex: 1;
        }
        
        .contact-label {
            font-size: 12px;
            color: #757575;
            margin-bottom: 2px;
        }
        
        .contact-value {
            font-weight: 500;
            color: var(--dark-color);
            word-break: break-all;
        }
        
        .about-text {
            text-align: left;
            color: #495057;
            font-size: 14px;
            line-height: 1.7;
        }
        
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .skill {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }
        
        .skill:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(67, 97, 238, 0.3);
        }
        
        .skill i {
            cursor: pointer;
            font-size: 12px;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }
        
        .skill i:hover {
            opacity: 1;
        }
        
        .add-skill {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .add-skill input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #dee2e6;
            border-radius: var(--border-radius);
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .add-skill input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .add-skill-btn {
            padding: 10px 20px;
            flex: 0;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #757575;
        }
        
        .member-since {
            background: rgba(75, 181, 67, 0.1);
            color: var(--success-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .edit-btn {
            background-color: var(--primary-color);
            color: white;
        }
        
        .edit-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
        }
        
        .contact-btn {
            background-color: var(--success-color);
            color: white;
        }
        
        .contact-btn:hover {
            background-color: #3a9a32;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(75, 181, 67, 0.3);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        
        .social-links a {
            color: #6c757d;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        
        .social-links a:hover {
            color: var(--primary-color);
            transform: translateY(-3px);
        }
        
        @media (max-width: 480px) {
            .profile-card {
                padding: 20px;
            }
            .buttons {
                flex-direction: column;
            }
            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="profile-card">
        <div class="avatar" id="avatar">OJ</div>
        <h1 class="freelancer-name" id="freelancerName">Freelancer</h1>
        <p class="freelancer-role" id="freelancerRole">Freelancer</p>

        <h2>Contact Info</h2>
        <div class="contact-info">
            <div class="contact-item">
                <div class="contact-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div class="contact-details">
                    <div class="contact-label">Full Name</div>
                    <div class="contact-value" id="contactName">-</div>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="contact-details">
                    <div class="contact-label">Email</div>
                    <div class="contact-value" id="contactEmail">-</div>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <i class="fas fa-phone"></i>
                </div>
                <div class="contact-details">
                    <div class="contact-label">Phone</div>
                    <div class="contact-value" id="contactPhone">Not set</div>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="contact-details">
                    <div class="contact-label">Location</div>
                    <div class="contact-value" id="contactLocation">Not set</div>
                </div>
            </div>
        </div>

        <h2>About Me</h2>
        <p class="about-text" id="aboutMe">No bio added yet. Click Edit Profile to add one.</p>

        <h2>Skills</h2>
        <div class="skills-container" id="skills"></div>
        <div class="add-skill">
            <input type="text" id="newSkill" placeholder="Add a skill (e.g., TypeScript)">
            <button class="edit-btn add-skill-btn" onclick="addSkill()">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="appliedJobs">0</div>
                <div class="stat-label">Applied Jobs</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="activeProjects">0</div>
                <div class="stat-label">Active Projects</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedProjects">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <div class="member-since">
            <i class="fas fa-calendar-alt"></i>
            <span>Member since: </span>
            <span id="memberSince">2025</span>
        </div>

        <div class="buttons">
            <button class="edit-btn" onclick="editProfile()">
                <i class="fas fa-edit"></i>
                <span>Edit Profile</span>
            </button>
            <button class="contact-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
                <span>Send Message</span>
            </button>
        </div>

        <div class="social-links">
            <a href="#" target="_blank"><i class="fab fa-github"></i></a>
            <a href="#" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="#" target="_blank"><i class="fab fa-dribbble"></i></a>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script>
        // Load logged-in user data
        const userName = localStorage.getItem('userName') || 'Freelancer';
        const userEmail = localStorage.getItem('userEmail') || 'freelancer@example.com';
        const userId = localStorage.getItem('userId') || '';

        const profileData = {
            name: userName,
            role: "Freelancer",
            email: userEmail,
            phone: localStorage.getItem('freelancerPhone') || '',
            location: localStorage.getItem('freelancerLocation') || '',
            about: localStorage.getItem('freelancerAbout') || '',
            skills: JSON.parse(localStorage.getItem('freelancerSkills') || '[]'),
            appliedJobs: 0,
            activeProjects: 0,
            completedProjects: 0,
            memberSince: new Date().getFullYear().toString()
        };

        // Fetch real stats from API
        async function loadFreelancerStats() {
            try {
                const API_BASE = (window.API_BASE || 'http://localhost:5000') + '/api';

                // Fetch freelancer info from DB
                const resp = await fetch(`${API_BASE}/freelancers/${userId}`);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.name) {
                        profileData.name = data.name;
                        document.getElementById("freelancerName").textContent = data.name;
                        document.getElementById("contactName").textContent = data.name;
                        const initials = data.name.split(' ').map(w => w[0]).join('').toUpperCase();
                        document.getElementById("avatar").textContent = initials;
                    }
                    if (data.email) {
                        profileData.email = data.email;
                        document.getElementById("contactEmail").textContent = data.email;
                    }
                }

                // Fetch application stats
                const appsResp = await fetch(`${API_BASE}/jobs/applications/freelancer/${userId}`);
                if (appsResp.ok) {
                    const apps = await appsResp.json();
                    profileData.appliedJobs = apps.length;
                    profileData.activeProjects = apps.filter(a => a.status === 'accepted' || a.status === 'in-progress').length;
                    profileData.completedProjects = apps.filter(a => a.status === 'completed').length;
                    document.getElementById("appliedJobs").textContent = profileData.appliedJobs;
                    document.getElementById("activeProjects").textContent = profileData.activeProjects;
                    document.getElementById("completedProjects").textContent = profileData.completedProjects;
                }
            } catch (e) {
                console.log('Could not load freelancer stats:', e);
            }
        }

        function initProfile() {
            // Name
            document.getElementById("freelancerName").textContent = profileData.name;
            document.getElementById("freelancerRole").textContent = profileData.role;
            document.getElementById("contactName").textContent = profileData.name;
            document.getElementById("contactEmail").textContent = profileData.email;
            document.getElementById("contactPhone").textContent = profileData.phone || 'Not set';
            document.getElementById("contactLocation").textContent = profileData.location || 'Not set';
            document.getElementById("aboutMe").textContent = profileData.about || 'No bio added yet. Click Edit Profile to add one.';
            document.getElementById("memberSince").textContent = profileData.memberSince;

            // Avatar initials
            const initials = profileData.name.split(' ').map(w => w[0]).join('').toUpperCase();
            document.getElementById("avatar").textContent = initials;

            // Skills
            renderSkills();

            // Load stats from API
            loadFreelancerStats();
        }

        function renderSkills() {
            const skillsContainer = document.getElementById("skills");
            skillsContainer.innerHTML = '';
            profileData.skills.forEach(skill => {
                const skillEl = document.createElement("div");
                skillEl.className = "skill";
                skillEl.innerHTML = `<span>${skill}</span><i class="fas fa-times remove-skill" onclick="removeSkill(this)"></i>`;
                skillsContainer.appendChild(skillEl);
            });
        }

        function saveSkillsToStorage() {
            profileData.skills = Array.from(document.querySelectorAll("#skills .skill span")).map(s => s.innerText);
            localStorage.setItem('freelancerSkills', JSON.stringify(profileData.skills));
        }

        function editProfile() {
            const newName = prompt("Enter your name:", profileData.name);
            const newPhone = prompt("Enter your phone:", profileData.phone);
            const newLocation = prompt("Enter your location:", profileData.location);
            const newAbout = prompt("Tell us about yourself:", profileData.about);

            if (newName) {
                profileData.name = newName;
                document.getElementById("freelancerName").textContent = newName;
                document.getElementById("contactName").textContent = newName;
                const initials = newName.split(' ').map(w => w[0]).join('').toUpperCase();
                document.getElementById("avatar").textContent = initials;
                localStorage.setItem('userName', newName);
            }
            if (newPhone !== null) {
                profileData.phone = newPhone;
                document.getElementById("contactPhone").textContent = newPhone || 'Not set';
                localStorage.setItem('freelancerPhone', newPhone);
            }
            if (newLocation !== null) {
                profileData.location = newLocation;
                document.getElementById("contactLocation").textContent = newLocation || 'Not set';
                localStorage.setItem('freelancerLocation', newLocation);
            }
            if (newAbout !== null) {
                profileData.about = newAbout;
                document.getElementById("aboutMe").textContent = newAbout || 'No bio added yet. Click Edit Profile to add one.';
                localStorage.setItem('freelancerAbout', newAbout);
            }
        }

        function addSkill() {
            const newSkillInput = document.getElementById("newSkill");
            const newSkill = newSkillInput.value.trim();
            if (newSkill) {
                profileData.skills.push(newSkill);
                saveSkillsToStorage();
                renderSkills();
                newSkillInput.value = "";
            }
        }

        function removeSkill(element) {
            const skillElement = element.parentElement;
            skillElement.style.transform = "scale(0.8)";
            skillElement.style.opacity = "0";
            setTimeout(() => {
                skillElement.remove();
                saveSkillsToStorage();
            }, 300);
        }

        function sendMessage() {
            const subject = encodeURIComponent("Regarding freelance work");
            const body = encodeURIComponent(`Hi ${profileData.name},\n\n`);
            window.location.href = `mailto:${profileData.email}?subject=${subject}&body=${body}`;
        }

        // Enter key for skill input
        document.getElementById("newSkill").addEventListener("keypress", function(e) {
            if (e.key === "Enter") addSkill();
        });

        // Initialize on load
        window.onload = initProfile;
    </script>
</body>

</html>
